name: build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-2022
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x86

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install Deps
        run: vcpkg install --triplet x86-windows-static

      - name: Install Deps Nuget
        run: nuget restore Sims3SettingsSetter.sln
    
      - name: Build
        run: |
          msbuild Sims3SettingsSetter.sln `
            -property:Configuration=Release `
            -property:Platform=x86

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Sims3SettingsSetter
          path: Release/
